name: CI
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-server:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET:                 ${{ secrets.JWT_SECRET }}
      ATLAS_URI:                  ${{ secrets.ATLAS_URI }}
      BCRYPT_SALT_ROUNDS:         ${{ secrets.BCRYPT_SALT_ROUNDS }}
      PORT:                       ${{ vars.PORT }}
      ALLOWED_ORIGIN:             ${{ vars.ALLOWED_ORIGIN }}
      ACCESS_TOKEN_EXPIRY:        ${{ vars.ACCESS_TOKEN_EXPIRY }}
      REFRESH_TOKEN_EXPIRY:       ${{ vars.REFRESH_TOKEN_EXPIRY }}
      REFRESH_TOKEN_EXPIRY_GUEST: ${{ vars.REFRESH_TOKEN_EXPIRY_GUEST }}
      BOARD_NAME_MAX_LENGTH:      ${{ vars.BOARD_NAME_MAX_LENGTH }}
      DISPLAY_NAME_MAX_LENGTH:    ${{ vars.DISPLAY_NAME_MAX_LENGTH }}
      BOARD_MAX_OBJECTS:          ${{ vars.BOARD_MAX_OBJECTS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 #v4.3.0
        with:
          path: server/node_modules
          key: server-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-

      - name: Install dependencies
        run: npm install
        working-directory: ./server
      - name: Type-check code
        run: npx tsc --noEmit
        working-directory: ./server
      - name: Run tests
        run: npm test
        working-directory: ./server
  build-client:
    runs-on: ubuntu-latest
    env:
      VITE_FETCH_TIMEOUT:           ${{ vars.VITE_FETCH_TIMEOUT }}
      VITE_API_URL:                 ${{ vars.VITE_API_URL }}
      VITE_SAVE_RETRY_COOLDOWN:     ${{ vars.VITE_SAVE_RETRY_COOLDOWN }}
      VITE_SAVE_RETRY_MAX_COOLDOWN: ${{ vars.VITE_SAVE_RETRY_MAX_COOLDOWN }}
      VITE_SAVE_REQUEST_COOLDOWN:   ${{ vars.VITE_SAVE_REQUEST_COOLDOWN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20


      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 #v4.3.0
        with:
          path: client/node_modules
          key: client-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-
      - name: Install dependencies
        run: npm install
        working-directory: ./client
      - name: Type-check code
        run: npx tsc --noEmit
        working-directory: ./client
      - name: Run tests
        run: npm test
        working-directory: ./client